name: CD Deploy to EC2

on:
  workflow_run:
    workflows: [ "CD Build Validation" ]
    types: [ completed ]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USER }}/mindbridge
            git fetch origin
            if git show-ref --verify --quiet refs/heads/${{ github.event.workflow_run.head_branch }}; then
              git checkout ${{ github.event.workflow_run.head_branch }}
            else
              git checkout -b ${{ github.event.workflow_run.head_branch }} origin/${{ github.event.workflow_run.head_branch }}
            fi
            git pull origin ${{ github.event.workflow_run.head_branch }}
            docker compose up -d --build --remove-orphans
