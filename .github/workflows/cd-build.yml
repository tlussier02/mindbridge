name: CD Build Validation

on:
  push:
    branches: [ master, rescue-cloud-ready ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Validate Docker Compose build
        run: docker compose build backend frontend nginx
