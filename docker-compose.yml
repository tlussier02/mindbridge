services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - JWT_SECRET=local-dev-secret-key-for-testing-123456789

  frontend:
    build:
      context: ./mindbridge
      args:
        API_PROXY_TARGET: http://backend:8080
    ports:
      - "3000:3000"
    environment:
      - API_PROXY_TARGET=http://backend:8080
    depends_on:
      - backend
