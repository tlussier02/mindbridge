# Test Configuration — overrides main application.properties for test context

# Disable Hibernate Second-Level Cache (JCache provider not available in @DataJpaTest slice)
spring.jpa.properties.hibernate.cache.use_second_level_cache=false

# H2 Database (in-memory for tests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=false
spring.jpa.open-in-view=false

# SQL Init
spring.sql.init.mode=never

# JWT
jwt.secret=test-secret-key-for-integration-tests-minimum-256-bits-long-enough
jwt.expiration=3600000
jwt.refresh-expiration=86400000

# H2 Console
spring.h2.console.enabled=false

# Spring AI - Anthropic
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}
spring.ai.anthropic.chat.options.model=claude-sonnet-4-20250514
spring.ai.anthropic.chat.options.max-tokens=100
spring.ai.anthropic.chat.options.temperature=0.0

# Vector Store
spring.ai.vectorstore.simple.store.path=./data/vectors/test-vector-store.json

# CLI disabled for tests
app.cli.enabled=false

# Logging
logging.level.root=WARN
logging.level.com.digitaltherapy=INFO

# OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
