# Application Configuration
spring.application.name=digital-therapy-assistant
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./data/digitaltherapy_db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

# Hibernate Second-Level Cache
spring.jpa.properties.hibernate.cache.use_second_level_cache=true
spring.jpa.properties.hibernate.cache.region.factory_class=org.hibernate.cache.jcache.internal.JCacheRegionFactory
spring.jpa.properties.hibernate.javax.cache.provider=com.github.benmanes.caffeine.jcache.spi.CaffeineCachingProvider
spring.jpa.properties.hibernate.cache.use_query_cache=false
spring.jpa.properties.hibernate.javax.cache.missing_cache_strategy=create
spring.jpa.properties.hibernate.generate_statistics=true

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# SQL Init
spring.sql.init.mode=always

app.cli.enabled=false

# Spring AI - Vector Store Persistence
spring.ai.vectorstore.simple.store.path=./data/vectors/vector-store.json

# Spring AI - Anthropic Configuration
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}
spring.ai.anthropic.chat.options.model=claude-sonnet-4-20250514
spring.ai.anthropic.chat.options.max-tokens=1024
spring.ai.anthropic.chat.options.temperature=0.7

# CLI API Client Configuration
cli.api.base-url=http://localhost:${server.port:8080}

# JWT Configuration
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-for-digital-therapy-app-replace-in-production}
jwt.expiration=3600000
jwt.refresh-expiration=86400000

# Logging Configuration
logging.level.com.digitaltherapy=DEBUG
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG

# Internal API calls (incoming HTTP requests/responses)
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation=DEBUG

# External API calls (Anthropic AI)
logging.level.org.springframework.ai=DEBUG
logging.level.org.springframework.ai.anthropic=DEBUG
logging.level.org.springframework.ai.chat.client=DEBUG

# Vector store searches and persistence
logging.level.org.springframework.ai.vectorstore=DEBUG
logging.level.org.springframework.ai.embedding=DEBUG

# HTTP client wire logging (shows full request/response to Anthropic)
logging.level.org.springframework.web.client.RestClient=DEBUG
logging.level.org.springframework.http.client=DEBUG

# OpenAPI/Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
